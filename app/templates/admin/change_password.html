{% extends "base.html" %}
{% block title %}Change password{% endblock %}
{% block content %}
<span class="eyebrow">One-Time Setup</span>
<h1>Set a new password</h1>
<p>This seed password only works once — set your own before continuing.</p>
<form method="post" action="/admin/change-password">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <label>New password <input type="password" name="new_password" required minlength="12" autofocus autocomplete="new-password"></label>
  <button type="submit">Set new password</button>
</form>
{% endblock %}
