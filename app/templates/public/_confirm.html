<div>
  <span class="eyebrow">Confirm</span>
  <div class="ticket-row">
    {% if track.album_image_url %}<img src="{{ track.album_image_url }}" alt="" width="64" height="64">{% endif %}
    <span class="ticket-details">
      <span class="track-name">{{ track.name }}</span>
      <span class="track-artist">{{ track.artist }}</span>
      {% if track.is_explicit %}<span class="explicit-badge">Explicit</span>{% endif %}
    </span>
  </div>

  <form hx-post="/request/submit" hx-target="#page-content" hx-swap="innerHTML">
    <input type="hidden" name="spotify_track_uri" value="{{ track.uri }}">
    <label>Your name <input type="text" name="requestor_name" required maxlength="80" autofocus></label>

    <div aria-hidden="true" class="hp-field">
      <label>Leave this field blank
        <input type="text" name="hp_confirm" tabindex="-1" autocomplete="off">
      </label>
    </div>

    <button type="submit">Submit request</button>
  </form>

  <p><a href="/request">Cancel, search again</a></p>
</div>
