{% extends "base.html" %}
{% block title %}Request a Song{% endblock %}
{% block content %}
<span class="eyebrow">Request Window</span>
<h1>What do you want to hear?</h1>

<div id="page-content">
  <input
    type="search"
    name="q"
    placeholder="Search for a song or artist…"
    autocomplete="off"
    aria-label="Search for a song or artist"
    hx-get="/request/search"
    hx-trigger="input changed delay:400ms, search"
    hx-target="#search-results"
    hx-indicator="#search-indicator"
  >
  <span id="search-indicator" class="htmx-indicator">Searching…</span>

  <div id="search-results"></div>
</div>
{% endblock %}
