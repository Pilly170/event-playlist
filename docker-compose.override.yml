# Auto-applied by `docker compose` alongside docker-compose.yml for local development only.
# Overrides the git-context build (required for Hostinger's deploy path, see docker-compose.yml)
# with a local build context, and restores direct host-port publishing for caddy, which
# production omits in favor of Hostinger's Traefik-based ingress (see docker-compose.yml).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"

  caddy:
    build:
      context: .
      dockerfile: caddy.Dockerfile
    # Production lets Docker assign an arbitrary host port (see docker-compose.yml) —
    # locally, pin it to 80 instead so it's predictable to hit at http://localhost.
    ports:
      - "80:80"
