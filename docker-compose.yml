# This is the file Hostinger's Compose-from-URL deploy path fetches directly (SPEC.md §9) —
# it never clones the surrounding repo, so `app.build.context` must be a git URL, not `.`.
# For local development, docker-compose.override.yml overrides this to build from the local tree.

services:
  caddy:
    build:
      context: https://github.com/Pilly170/event-playlist.git#main
      dockerfile: caddy.Dockerfile
    restart: unless-stopped
    # No published port at all: a separate, already-deployed Traefik project on this
    # VPS (see /docker/traefik/docker-compose.yml on the host, CLAUDE.md has the full
    # story) runs with network_mode: host and --providers.docker=true — it reaches any
    # container directly via the Docker socket/bridge network without needing a
    # published host port or a shared network, and issues a real Let's Encrypt
    # certificate via the labels below. --providers.docker.exposedbydefault=false
    # means nothing is routed unless traefik.enable=true is set explicitly.
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    labels:
      - traefik.enable=true
      - traefik.http.routers.event-playlist.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.event-playlist.entrypoints=websecure
      - traefik.http.routers.event-playlist.tls.certresolver=letsencrypt
      - traefik.http.services.event-playlist.loadbalancer.server.port=80
    depends_on:
      - app

  app:
    build:
      context: https://github.com/Pilly170/event-playlist.git#main
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      DATABASE_PATH: /data/app.db
      DOMAIN: ${DOMAIN}
    volumes:
      - app_data:/data
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp

volumes:
  caddy_data:
  caddy_config:
  app_data:
