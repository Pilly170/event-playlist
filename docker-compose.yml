# This is the file Hostinger's Compose-from-URL deploy path fetches directly (SPEC.md §9) —
# it never clones the surrounding repo, so `app.build.context` must be a git URL, not `.`.
# For local development, docker-compose.override.yml overrides this to build from the local tree.

services:
  caddy:
    build:
      context: https://github.com/Pilly170/event-playlist.git#main
      dockerfile: caddy.Dockerfile
    restart: unless-stopped
    # Do not hardcode a host port (e.g. "80:80") — a native Traefik process owned by
    # Hostinger's own platform (not a container, not something this project's compose
    # file manages) already listens on host 80/443 for every project on the VPS. The
    # single-value form below publishes the container's port 80 to an
    # arbitrary/ephemeral host port instead, matching how other working projects on
    # this same host (e.g. a sibling limesurvey deployment) are set up — Hostinger's
    # ingress discovers and routes to that assigned port itself; there is no
    # traefik-proxy network or traefik.* label convention to opt into (an earlier fix
    # here assumed the generic self-hosted-Traefik-template pattern applied and added
    # exactly that; it doesn't — no such network or Traefik container exists on this
    # VPS at all, confirmed via `docker network ls`/`docker ps -a`, and referencing a
    # nonexistent external network broke `docker compose` validation entirely before
    # any container could even start). See CLAUDE.md for the full history here.
    ports:
      - "80"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    depends_on:
      - app

  app:
    build:
      context: https://github.com/Pilly170/event-playlist.git#main
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      DATABASE_PATH: /data/app.db
      DOMAIN: ${DOMAIN}
    volumes:
      - app_data:/data
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp

volumes:
  caddy_data:
  caddy_config:
  app_data:
