# This is the file Hostinger's Compose-from-URL deploy path fetches directly (SPEC.md §9) —
# it never clones the surrounding repo, so `app.build.context` must be a git URL, not `.`.
# For local development, docker-compose.override.yml overrides this to build from the local tree.

services:
  caddy:
    build:
      context: https://github.com/Pilly170/event-playlist.git#main
      dockerfile: caddy.Dockerfile
    restart: unless-stopped
    # Do not use ports 80/443 — a pre-existing, unrelated native Traefik process on
    # this specific VPS (nothing to do with Hostinger's platform itself, nor with this
    # project — see CLAUDE.md) already owns those. A single-value port form (letting
    # Docker auto-assign an arbitrary host port) was tried first, matching how sibling
    # projects on this host are set up, but that breaks Spotify's OAuth redirect URI
    # (which must exactly match a fixed, registered value) and gives attendees no
    # stable URL — the port changes on every redeploy. 8443 was confirmed free via
    # `sudo ss -tlnp` on the actual VPS before picking it; update this (and
    # SPOTIFY_REDIRECT_URI in Hostinger's panel) together if it ever conflicts.
    ports:
      - "8443:80"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    depends_on:
      - app

  app:
    build:
      context: https://github.com/Pilly170/event-playlist.git#main
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      DATABASE_PATH: /data/app.db
      DOMAIN: ${DOMAIN}
    volumes:
      - app_data:/data
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp

volumes:
  caddy_data:
  caddy_config:
  app_data:
