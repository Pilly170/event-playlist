# This is the file Hostinger's Compose-from-URL deploy path fetches directly (SPEC.md §9) —
# it never clones the surrounding repo, so `app.build.context` must be a git URL, not `.`.
# For local development, docker-compose.override.yml overrides this to build from the local tree.

services:
  caddy:
    build:
      context: https://github.com/Pilly170/event-playlist.git#main
      dockerfile: caddy.Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    networks:
      - default
      - traefik-proxy
    # Hostinger's Docker Manager runs its own Traefik instance as the sole listener on
    # host ports 80/443, shared across every project on the VPS — no per-project
    # container may bind those ports directly (confirmed via a real deploy attempt,
    # see CLAUDE.md). Traefik discovers this container over the external
    # traefik-proxy network via these labels rather than a published port; it
    # terminates TLS itself, so SITE_ADDRESS must be http://<domain> here (Caddy
    # serves plain HTTP internally to Traefik, not its own Let's Encrypt).
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=80
    depends_on:
      - app

  app:
    build:
      context: https://github.com/Pilly170/event-playlist.git#main
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      DATABASE_PATH: /data/app.db
      DOMAIN: ${DOMAIN}
    volumes:
      - app_data:/data
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp

volumes:
  caddy_data:
  caddy_config:
  app_data:

networks:
  # Hostinger's pre-deployed Traefik project template creates this network; every
  # other project joins it as external rather than each managing its own copy.
  traefik-proxy:
    external: true
